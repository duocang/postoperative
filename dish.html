<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日菜谱</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');

  :root {
    --color-bg: #FFFFFF;
    --color-surface: #FFFFFF;
    --color-text: #2D1B0E;
    --color-text-secondary: #6B5240;
    --color-primary: #8B6BAE;
    --color-primary-light: #D4C4E8;
    --color-primary-bg: #F6F2FA;
    --color-accent: #5B8A72;
    --color-accent-light: #D4E8DC;
    --color-accent-bg: #F0F7F3;
    --color-warm: #9B7EC4;
    --color-warm-light: #F3EEF8;
    --color-tip-bg: #FFF8ED;
    --color-tip-border: #D4A853;
    --color-divider: #E8DDD0;
    --shadow-sm: 0 1px 2px rgba(45, 27, 14, 0.05);
    --shadow-md: 0 2px 6px rgba(45, 27, 14, 0.08);
    --shadow-lg: 0 4px 12px rgba(45, 27, 14, 0.1);
    --radius-lg: 14px;
    --radius-md: 10px;
    --radius-sm: 8px;
  }

  html, body {
    min-height: 100vh;
  }

  body {
    font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--color-bg);
    color: var(--color-text);
    padding: 6px 8px;
    font-size: 18px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
  }

  .container {
    width: 100%;
    max-width: none;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .hidden { display: none !important; }

  /* ===== Reminder Card ===== */
  .reminder-card {
    background: linear-gradient(135deg, #EBF4FF 0%, #F5F9FF 100%);
    border-radius: var(--radius-md);
    padding: 20px 40px;
    box-shadow: var(--shadow-md);
    border: 2px solid #A3C9F7;
    text-align: center;
  }
  .reminder-text {
    font-size: 84px;
    font-weight: 700;
    color: #2B6CB0;
    line-height: 1.3;
  }

  /* ===== Recipe Grid ===== */
  .recipe-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }

  /* ===== Column Card ===== */
  .recipe-column {
    background: var(--color-surface);
    border-radius: var(--radius-md);
    border: 2px solid var(--color-divider);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .col-header {
    padding: 5px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  #col-staple .col-header {
    background: linear-gradient(135deg, var(--color-primary-bg) 0%, var(--color-surface) 100%);
    border-bottom: 2px solid var(--color-primary-light);
  }
  #col-dish .col-header {
    background: linear-gradient(135deg, var(--color-accent-bg) 0%, var(--color-surface) 100%);
    border-bottom: 2px solid var(--color-accent-light);
  }

  .col-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 15px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 100px;
    flex-shrink: 0;
  }
  .col-badge svg {
    width: 10px;
    height: 10px;
  }
  #col-staple .col-badge {
    background: var(--color-primary);
    color: #fff;
  }
  #col-dish .col-badge {
    background: var(--color-accent);
    color: #fff;
  }

  .col-name {
    font-size: 20px;
    font-weight: 700;
    color: var(--color-text);
    line-height: 1.2;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .btn-swap {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    padding: 3px 8px;
    font-size: 16px;
    font-family: inherit;
    font-weight: 600;
    border: 1px solid var(--color-divider);
    border-radius: var(--radius-sm);
    background: var(--color-surface);
    color: var(--color-text-secondary);
    cursor: pointer;
    transition: all 0.15s ease;
    flex-shrink: 0;
    min-width: 36px;
    min-height: 28px;
  }
  .btn-swap:hover {
    border-color: var(--color-primary);
    color: var(--color-primary);
    background: var(--color-primary-bg);
  }
  .btn-swap:active { transform: scale(0.96); }
  .btn-swap:focus-visible {
    outline: 2px solid var(--color-primary);
    outline-offset: 1px;
  }
  .btn-swap:disabled {
    opacity: 0.4;
    cursor: default;
  }
  .btn-swap svg {
    width: 12px;
    height: 12px;
  }

  /* Meta Row */
  .meta-row {
    display: flex;
    gap: 4px;
    padding: 4px 10px;
    flex-shrink: 0;
  }
  .meta-item {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 15px;
    color: var(--color-text-secondary);
    background: var(--color-bg);
    padding: 1px 5px;
    border-radius: 100px;
  }
  .meta-item svg {
    width: 10px;
    height: 10px;
    flex-shrink: 0;
  }

  /* Content Sections */
  .col-body {
    padding: 0 8px 8px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .section-block {
    border-radius: var(--radius-sm);
    padding: 5px 7px;
  }
  .ingredients-block {
    background: var(--color-warm-light);
    border: 1px solid rgba(201, 169, 110, 0.3);
    flex-shrink: 0;
  }
  #col-dish .ingredients-block {
    background: #EDF5F0;
    border-color: rgba(91, 138, 114, 0.2);
  }
  #col-staple .ingredients-block {
    background: #F3EEF8;
    border-color: rgba(155, 126, 196, 0.2);
  }

  .section-label {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 16px;
    font-weight: 700;
    color: var(--color-text);
    margin-bottom: 2px;
  }
  .section-label svg {
    width: 11px;
    height: 11px;
  }
  #col-staple .section-label svg { color: var(--color-warm); }
  #col-dish .section-label svg { color: var(--color-accent); }

  .ingredients-text {
    font-size: 16px;
    color: var(--color-text);
    line-height: 1.6;
  }
  .ingredient-tag {
    display: inline-block;
    background: var(--color-surface);
    padding: 0px 4px;
    border-radius: 4px;
    margin: 1px 2px;
    border: 1px solid var(--color-divider);
    font-size: 15px;
  }

  /* Instructions */
  .instructions-block {
    background: var(--color-surface);
    border: 1px solid var(--color-divider);
  }
  .instructions-list {
    list-style: none;
    padding: 0;
  }
  .instructions-list li {
    display: flex;
    align-items: flex-start;
    gap: 5px;
    padding: 3px 0;
    font-size: 16px;
    color: var(--color-text);
    line-height: 1.5;
  }
  .instructions-list li + li {
    border-top: 1px dashed var(--color-divider);
  }
  .step-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }
  #col-staple .step-num {
    background: var(--color-primary);
    color: #fff;
  }
  #col-dish .step-num {
    background: var(--color-accent);
    color: #fff;
  }
  .step-text {
    flex: 1;
  }

  /* Tip */
  .tip-block {
    background: var(--color-tip-bg);
    border: 1px solid rgba(212, 168, 83, 0.3);
    border-left: 3px solid var(--color-tip-border);
    display: flex;
    align-items: flex-start;
    gap: 4px;
    padding: 4px 6px;
    flex-shrink: 0;
  }
  .tip-block svg {
    width: 12px;
    height: 12px;
    color: var(--color-tip-border);
    flex-shrink: 0;
    margin-top: 1px;
  }
  #col-staple .tip-block {
    background: #F8F4FC;
    border: 1px solid rgba(155, 126, 196, 0.25);
    border-left: 3px solid #9B7EC4;
  }
  #col-staple .tip-block svg {
    color: #9B7EC4;
  }
  #col-dish .tip-block {
    background: #EDF7F2;
    border: 1px solid rgba(91, 138, 114, 0.2);
    border-left: 3px solid #5B8A72;
  }
  #col-dish .tip-block svg {
    color: #5B8A72;
  }
  .tip-text {
    font-size: 15px;
    color: var(--color-text-secondary);
    line-height: 1.5;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      transition-duration: 0.01ms !important;
      animation-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Reminder -->
  <div id="reminder-section" class="hidden">
    <div class="reminder-card">
      <div id="reminder-text" class="reminder-text">冰箱有酸奶，喝！</div>
    </div>
  </div>

  <!-- Recipes -->
  <div id="recipe-section">
    <div class="recipe-grid">

      <!-- Staple -->
      <div class="recipe-column" id="col-staple">
        <div class="col-header">
          <span class="col-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 12 2.1 6.3"/></svg>
            主食
          </span>
          <div id="staple-name" class="col-name"></div>
          <button class="btn-swap" onclick="swapStaple()" aria-label="换一道主食">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
            换一道
          </button>
        </div>
        <div class="meta-row">
          <span class="meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span id="staple-time"></span>
          </span>
          <span class="meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span id="staple-steps"></span>
          </span>
          <span class="meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2"/><path d="M12 6v6l4 2"/></svg>
            <span id="staple-method"></span>
          </span>
        </div>
        <div class="col-body">
          <div class="section-block ingredients-block">
            <div class="section-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
              食材
            </div>
            <div id="staple-ingredients" class="ingredients-text"></div>
          </div>
          <div class="section-block instructions-block">
            <div class="section-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              做法
            </div>
            <ol id="staple-instructions" class="instructions-list"></ol>
          </div>
          <div id="staple-tip" class="section-block tip-block hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            <span id="staple-tip-text" class="tip-text"></span>
          </div>
        </div>
      </div>

      <!-- Dish -->
      <div class="recipe-column" id="col-dish">
        <div class="col-header">
          <span class="col-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 12 2.1 6.3"/></svg>
            菜品
          </span>
          <div id="dish-name" class="col-name"></div>
          <button class="btn-swap" onclick="swapDish()" aria-label="换一道菜">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
            换一道
          </button>
        </div>
        <div class="meta-row">
          <span class="meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span id="dish-time"></span>
          </span>
          <span class="meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span id="dish-steps"></span>
          </span>
          <span class="meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2"/><path d="M12 6v6l4 2"/></svg>
            <span id="dish-method"></span>
          </span>
        </div>
        <div class="col-body">
          <div class="section-block ingredients-block">
            <div class="section-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
              食材
            </div>
            <div id="dish-ingredients" class="ingredients-text"></div>
          </div>
          <div class="section-block instructions-block">
            <div class="section-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              做法
            </div>
            <ol id="dish-instructions" class="instructions-list"></ol>
          </div>
          <div id="dish-tip" class="section-block tip-block hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            <span id="dish-tip-text" class="tip-text"></span>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
var recipes = [
  {
    name: "清蒸鲈鱼配山药泥",
    category: "菜",    time: "15分钟", steps: 3, method: "清蒸",
    ingredients: ["鲈鱼1条", "山药200g", "姜丝", "葱花", "盐少许", "香油几滴"],
    instructions: [
      "鲈鱼洗净，鱼身划两刀，铺姜丝，上锅蒸8分钟",
      "山药去皮切块，同时蒸15分钟，取出捣成泥",
      "鱼出锅撒葱花、淋少许香油，山药泥铺底装盘"
    ],
    tip: "鲈鱼刺少肉嫩，容易消化，适合术后食用"
  },
  {
    name: "菠菜鸡蛋羹",
    category: "菜",    time: "12分钟", steps: 3, method: "清蒸",
    ingredients: ["鸡蛋2个", "菠菜50g", "温水（鸡蛋的1.5倍）", "盐少许", "香油几滴"],
    instructions: [
      "鸡蛋打散，加入温水和少许盐搅匀",
      "菠菜焯水后挤干切碎末，撒入蛋液中拌匀",
      "撇去泡沫，上锅蒸8-10分钟，出锅淋香油"
    ],
    tip: "菠菜碎和蛋液一起蒸，一步到位有菜有蛋白"
  },
  {
    name: "山药排骨蒸蛋",
    category: "菜",    time: "25分钟", steps: 3, method: "清蒸",
    ingredients: ["排骨150g", "山药100g", "鸡蛋1个", "姜2片", "盐少许"],
    instructions: [
      "排骨冷水下锅焯去血沫，捞出洗净",
      "山药去皮切滚刀块，与排骨一起放入碗中",
      "打入鸡蛋，加少许水和盐，上锅蒸20分钟"
    ],
    tip: "排骨选小排，肉嫩易嚼"
  },
  {
    name: "胡萝卜鸡茸粥",
    category: "主食",    time: "30分钟", steps: 3, method: "煮",
    ingredients: ["大米半杯", "鸡胸肉80g", "胡萝卜半根", "姜丝", "盐少许"],
    instructions: [
      "大米洗净加水，大火煮开后转小火熬20分钟",
      "鸡胸肉剁成茸，胡萝卜擦细丝",
      "粥快好时加入鸡茸和胡萝卜丝，搅散煮5分钟，加盐调味"
    ],
    tip: "鸡茸入锅后要快速搅散，防止结块"
  },
  {
    name: "冬瓜蒸肉末",
    category: "菜",    time: "20分钟", steps: 3, method: "清蒸",
    ingredients: ["冬瓜300g", "猪里脊肉100g", "姜末", "盐少许", "生抽几滴"],
    instructions: [
      "冬瓜去皮切厚片，铺在盘底",
      "里脊肉剁成末，加姜末、少许盐和生抽拌匀",
      "肉末铺在冬瓜上，上锅蒸15分钟"
    ],
    tip: "冬瓜本身出水，蒸的时候不用额外加水"
  },
  {
    name: "软烂小米粥",
    category: "主食",    time: "25分钟", steps: 2, method: "煮",
    ingredients: ["小米半杯", "水6杯", "南瓜100g（可选）"],
    instructions: [
      "小米淘洗干净，南瓜去皮切小丁",
      "小米和南瓜一起加水，大火煮开转小火熬20分钟至粘稠"
    ],
    tip: "小米粥养胃易消化，可作早餐"
  },
  {
    name: "白萝卜鲫鱼汤",
    category: "菜",    time: "30分钟", steps: 3, method: "煮",
    ingredients: ["鲫鱼1条", "白萝卜200g", "姜3片", "葱段", "盐少许"],
    instructions: [
      "鲫鱼洗净，白萝卜去皮切薄片",
      "锅中放少许油，姜片爆香，鲫鱼两面略煎",

var staples = recipes.filter(function(r) { return r.category === '主食'; });
var dishes = recipes.filter(function(r) { return r.category === '菜'; });
var stapleSwapHistory = [];
var dishSwapHistory = [];
var stapleToday = -1;
var dishToday = -1;

function renderColumn(prefix, recipe) {
  var nameEl = document.getElementById(prefix + '-name');
  var timeEl = document.getElementById(prefix + '-time');
  var stepsEl = document.getElementById(prefix + '-steps');
  var methodEl = document.getElementById(prefix + '-method');
  var ingEl = document.getElementById(prefix + '-ingredients');
  var instrEl = document.getElementById(prefix + '-instructions');
  var tipEl = document.getElementById(prefix + '-tip');
  var tipTextEl = document.getElementById(prefix + '-tip-text');

  if (!recipe) {
    nameEl.textContent = '暂无';
    timeEl.textContent = '--';
    stepsEl.textContent = '--';
    methodEl.textContent = '--';
    ingEl.textContent = '';
    instrEl.innerHTML = '';
    tipEl.classList.add('hidden');
    return;
  }

  nameEl.textContent = recipe.name;
  timeEl.textContent = recipe.time;
  stepsEl.textContent = recipe.steps + '步';
  methodEl.textContent = recipe.method;

  ingEl.innerHTML = recipe.ingredients.map(function(ing) {
    return '<span class="ingredient-tag">' + ing + '</span>';
  }).join('');

  instrEl.innerHTML = '';
  for (var i = 0; i < recipe.instructions.length; i++) {
    var li = document.createElement('li');
    var numSpan = document.createElement('span');
    numSpan.className = 'step-num';
    numSpan.textContent = i + 1;
    var textSpan = document.createElement('span');
    textSpan.className = 'step-text';
    textSpan.textContent = recipe.instructions[i];
    li.appendChild(numSpan);
    li.appendChild(textSpan);
    instrEl.appendChild(li);
  }

  if (recipe.tip) {
    tipTextEl.textContent = recipe.tip;
    tipEl.classList.remove('hidden');
  } else {
    tipTextEl.textContent = '';
    tipEl.classList.add('hidden');
  }
}

function getToday(list) {
  var now = new Date();
  var start = new Date(now.getFullYear(), 0, 0);
  var dayOfYear = Math.floor((now - start) / 86400000);
  return list[dayOfYear % list.length];
}

function getTodayIndex(list) {
  var now = new Date();
  var start = new Date(now.getFullYear(), 0, 0);
  var dayOfYear = Math.floor((now - start) / 86400000);
  return dayOfYear % list.length;
}

function swapOne(list, history, todayIdx) {
  if (history.length >= list.length - 1) return null;
  var idx;
  do {
    idx = Math.floor(Math.random() * list.length);
  } while (idx === todayIdx || history.indexOf(idx) !== -1);
  history.push(idx);
  return list[idx];
}

function swapStaple() {
  stapleToday = stapleToday === -1 ? getTodayIndex(staples) : stapleToday;
  var s = swapOne(staples, stapleSwapHistory, stapleToday);
  if (!s) {
    document.querySelector('#col-staple .btn-swap').disabled = true;
    document.querySelector('#col-staple .btn-swap').textContent = '已全部';
    return;
  }
  renderColumn('staple', s);
}

function swapDish() {
  dishToday = dishToday === -1 ? getTodayIndex(dishes) : dishToday;
  var d = swapOne(dishes, dishSwapHistory, dishToday);
  if (!d) {
    document.querySelector('#col-dish .btn-swap').disabled = true;
    document.querySelector('#col-dish .btn-swap').textContent = '已全部';
    return;
  }
  renderColumn('dish', d);
}

function hasReminder() {
  var el = document.getElementById('reminder-text');
  return el && el.textContent.trim().length > 0;
}

function init() {
  stapleToday = getTodayIndex(staples);
  dishToday = getTodayIndex(dishes);

  if (hasReminder()) {
    document.getElementById('reminder-section').classList.remove('hidden');
    document.getElementById('recipe-section').classList.remove('hidden');
    renderColumn('staple', getToday(staples));
    renderColumn('dish', getToday(dishes));
    document.title = '今日叮嘱';
  } else {
    document.getElementById('reminder-section').classList.add('hidden');
    document.getElementById('recipe-section').classList.remove('hidden');
    renderColumn('staple', getToday(staples));
    renderColumn('dish', getToday(dishes));
    stapleSwapHistory.push(stapleToday);
    dishSwapHistory.push(dishToday);
  }
}

window.addEventListener('DOMContentLoaded', init);
</script>
